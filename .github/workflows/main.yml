# ═══════════════════════════════════════════════════════════════════════════
# GymMateHub/Backend — CI/CD Pipeline
# Triggers: push/PR to main, dev
# Steps: build + test → build & push image to GHCR → dispatch deploy to
#        Vantroxia-Labs/infra (which rolls the stack on the VPS).
# ═══════════════════════════════════════════════════════════════════════════
name: GymMate-hub CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gymmatehub/gymmate-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Build + Test
  # ─────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven (skip tests for faster build)
        run: ./mvnw -B clean package -DskipTests

      - name: Run tests with test profile
        run: ./mvnw -B test -Dspring.profiles.active=test
        env:
          # Flyway disabled during tests (H2 doesn't support uuidv7())
          SPRING_FLYWAY_ENABLED: false

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Build & Push image to GHCR (main/dev pushes only)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "sha_tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.IMAGE_NAME) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ steps.tags.outputs.branch_tag }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-${{ steps.tags.outputs.branch_tag }},mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Step 3: Trigger deploy on the VPS via the infra repo (main only)
  # ─────────────────────────────────────────────────────────────────────────
  trigger-deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: Vantroxia-Labs/infra
          event-type: deploy
          client-payload: |
            {
              "service": "gymmate",
              "image_tag": "${{ needs.docker.outputs.sha_tag || 'latest' }}",
              "triggered_by": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}"
            }
